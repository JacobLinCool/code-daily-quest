name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - runner: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --package code-daily-quest --target ${{ matrix.target }}

      - name: Package release artifact
        run: >
          bash scripts/package-release.sh
          ${{ matrix.target }}
          target/${{ matrix.target }}/release/code-daily-quest
          dist

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/code-daily-quest-${{ matrix.target }}.tar.gz
            dist/code-daily-quest-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
